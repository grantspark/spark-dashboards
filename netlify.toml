[build]
  command = "pnpm build"
  publish = "out"

# Static export — every route has its own HTML file.
# Netlify auto-serves 404.html for missing paths.
# No SPA fallback needed; the /* rewrite was shadowing /ops/ with /index.html.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
